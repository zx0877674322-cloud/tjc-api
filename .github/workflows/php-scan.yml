name: "PHP Quality & Security Scan"

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '36 8 * * 4'

jobs:
  analyze:
    name: PHP Analysis
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    # 1. ตั้งค่าสภาพแวดล้อม PHP
    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.2' 
        tools: phpstan, composer
        coverage: none

    # 2. ตรวจสอบและติดตั้ง Dependencies
    - name: Install Dependencies
      run: |
        if [ -f "composer.json" ]; then
          composer install --prefer-dist --no-progress
        else
          echo "No composer.json found, skipping."
        fi

    # 3. สแกนหาช่องโหว่ความปลอดภัยใน Library
    - name: Check for Security Vulnerabilities (Composer Audit)
      run: |
        if [ -f "composer.json" ]; then
          composer audit
        else
          echo "No composer.json found, skipping."
        fi

    # 4. สแกนคุณภาพโค้ดด้วย PHPStan (เรียกใช้ไฟล์ Config)
    - name: Run PHPStan
      run: phpstan analyse -c phpstan.neon
